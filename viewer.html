<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Viewer — Kenney Platformer Kit</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1a2e; color:#fff; font-family:'Segoe UI',Arial,sans-serif; }

header {
  position:sticky; top:0; z-index:10;
  background:#0d1a2e; border-bottom:1px solid rgba(255,255,255,.12);
  padding:14px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
}
h1 { font-size:20px; color:#f1c40f; white-space:nowrap; }
h1 span { font-size:13px; color:rgba(255,255,255,.4); font-weight:normal; margin-left:8px; }

#search {
  flex:1; min-width:180px; padding:8px 14px; border-radius:8px;
  font-size:14px; background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18); color:#fff; outline:none;
}
#search::placeholder { color:rgba(255,255,255,.3); }
#search:focus { border-color:#f1c40f; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(155px,1fr));
  gap:10px; padding:16px;
}

.card {
  background:#1a2a3a; border-radius:12px; padding:10px;
  text-align:center; border:2px solid transparent;
  transition:border-color .15s, transform .15s, box-shadow .15s;
}
.card:hover { border-color:#f1c40f; transform:translateY(-3px); box-shadow:0 6px 22px rgba(0,0,0,.5); }
.card[hidden] { display:none; }

model-viewer {
  width:135px; height:135px; border-radius:8px;
  background:#0a141e; display:block; margin:0 auto 8px;
  --progress-bar-color: #f1c40f;
  --progress-bar-height: 2px;
}

.num  { color:#f1c40f; font-weight:700; font-size:15px; margin-bottom:3px; }
.name { color:rgba(255,255,255,.6); font-size:10.5px; word-break:break-all; line-height:1.35; }
</style>
</head>
<body>

<header>
  <h1>Kenney Assets <span id="total-label"></span></h1>
  <input id="search" type="text" placeholder="Search name or #number…">
</header>

<div class="grid" id="grid"></div>

<!-- Google model-viewer — handles GLB display automatically -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<script>
const MODELS = [
  'arrow','arrows','barrel',
  'block-grass-corner-low','block-grass-corner-overhang-low','block-grass-corner-overhang','block-grass-corner',
  'block-grass-curve-half','block-grass-curve-low','block-grass-curve',
  'block-grass-edge','block-grass-hexagon',
  'block-grass-large-slope-narrow','block-grass-large-slope-steep-narrow','block-grass-large-slope-steep','block-grass-large-slope',
  'block-grass-large-tall','block-grass-large','block-grass-long',
  'block-grass-low-hexagon','block-grass-low-large','block-grass-low-long','block-grass-low-narrow','block-grass-low',
  'block-grass-narrow',
  'block-grass-overhang-corner','block-grass-overhang-edge','block-grass-overhang-hexagon',
  'block-grass-overhang-large-slope-narrow','block-grass-overhang-large-slope-steep-narrow',
  'block-grass-overhang-large-slope-steep','block-grass-overhang-large-slope',
  'block-grass-overhang-large-tall','block-grass-overhang-large','block-grass-overhang-long',
  'block-grass-overhang-low-hexagon','block-grass-overhang-low-large','block-grass-overhang-low-long',
  'block-grass-overhang-low-narrow','block-grass-overhang-low','block-grass-overhang-narrow',
  'block-grass',
  'block-moving-blue','block-moving-large','block-moving',
  'block-snow-corner-low','block-snow-corner-overhang-low','block-snow-corner-overhang','block-snow-corner',
  'block-snow-curve-half','block-snow-curve-low','block-snow-curve',
  'block-snow-edge','block-snow-hexagon',
  'block-snow-large-slope-narrow','block-snow-large-slope-steep-narrow','block-snow-large-slope-steep','block-snow-large-slope',
  'block-snow-large-tall','block-snow-large','block-snow-long',
  'block-snow-low-hexagon','block-snow-low-large','block-snow-low-long','block-snow-low-narrow','block-snow-low',
  'block-snow-narrow',
  'block-snow-overhang-corner','block-snow-overhang-edge','block-snow-overhang-hexagon',
  'block-snow-overhang-large-slope-narrow','block-snow-overhang-large-slope-steep-narrow',
  'block-snow-overhang-large-slope-steep','block-snow-overhang-large-slope',
  'block-snow-overhang-large-tall','block-snow-overhang-large','block-snow-overhang-long',
  'block-snow-overhang-low-hexagon','block-snow-overhang-low-large','block-snow-overhang-low-long',
  'block-snow-overhang-low-narrow','block-snow-overhang-low','block-snow-overhang-narrow',
  'block-snow',
  'bomb','brick','button-round','button-square',
  'character-oobi','character-oodi','character-ooli','character-oopi','character-oozi',
  'chest','coin-bronze','coin-gold','coin-silver','conveyor-belt',
  'crate-item-strong','crate-item','crate-strong','crate',
  'door-large-open','door-open','door-rotate-large','door-rotate',
  'fence-broken','fence-corner-curved','fence-corner',
  'fence-low-broken','fence-low-corner-curved','fence-low-corner','fence-low-straight',
  'fence-rope','fence-straight',
  'flag','flowers-tall','flowers','grass','heart',
  'hedge-corner','hedge','jewel','key',
  'ladder-broken','ladder-long','ladder','lever','lock',
  'mushrooms','pipe','plant',
  'platform-fortified','platform-overhang','platform-ramp','platform',
  'poles','rocks','saw','sign',
  'spike-block-wide','spike-block','spring','star','stones',
  'trap-spikes-large','trap-spikes',
  'tree-pine-small','tree-pine-snow-small','tree-pine-snow','tree-pine',
  'tree-snow','tree'
];

const BASE = 'assets/Models/GLB%20format/';
const grid = document.getElementById('grid');
document.getElementById('total-label').textContent = `— ${MODELS.length} assets`;

MODELS.forEach((name, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.name = name;
  card.dataset.num  = String(i + 1);
  card.innerHTML = `
    <model-viewer
      src="${BASE}${name}.glb"
      auto-rotate
      camera-controls
      loading="lazy"
      reveal="auto"
      shadow-intensity="0.6"
      environment-image="neutral"
    ></model-viewer>
    <div class="num">#${i + 1}</div>
    <div class="name">${name}</div>
  `;
  grid.appendChild(card);
});

// Search / filter
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const nameMatch = card.dataset.name.includes(q);
    const numMatch  = card.dataset.num === q || ('#' + card.dataset.num) === q;
    card.hidden = q !== '' && !nameMatch && !numMatch;
  });
});
</script>
</body>
</html>
